<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: var(--tg-theme-bg-color, #fff); }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; }
        button { width: 100%; padding: 12px; background: var(--tg-theme-button-color, #2481cc); color: white; border: none; border-radius: 8px; }
        .status { margin: 10px 0; padding: 10px; border-radius: 8px; display: none; }
        .status.show { display: block; }
    </style>
</head>
<body>
    <h3>📝 Тестовая форма</h3>
    <div id="status" class="status"></div>
    
    <form id="form">
        <input type="text" id="name" placeholder="Имя" required>
        <input type="email" id="email" placeholder="Email" required>
        <textarea id="msg" placeholder="Сообщение" required></textarea>
        <button type="submit" id="btn">Отправить</button>
    </form>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        const status = document.getElementById('status');
        const showStatus = (text, isError) => {
            status.textContent = text;
            status.className = 'status show ' + (isError ? 'error' : 'success');
            status.style.background = isError ? '#ffebee' : '#e8f5e9';
            status.style.color = isError ? '#c62828' : '#2e7d32';
        };

        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('btn').disabled = true;
            
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('msg').value,
                user_id: tg.initDataUnsafe?.user?.id,
                query_id: tg.initDataUnsafe?.query_id
            };
            
            // СПОСОБ 1: Через Telegram API (если работает)
            try {
                tg.sendData(JSON.stringify(data));
                showStatus('✅ Отправлено через Telegram!');
                setTimeout(() => tg.close(), 1000);
                return;
            } catch (err) {
                console.log('sendData не сработал:', err);
            }
        });
    </script>
</body>
</html>
