<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, #17212b);
            color: var(--tg-theme-text-color, #ffffff);
            min-height: 100vh;
            padding: 16px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .qr-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: var(--tg-theme-secondary-bg-color, #242f3d);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: opacity 0.2s;
        }

        .qr-btn:active {
            opacity: 0.7;
        }

        .qr-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--tg-theme-text-color, #ffffff);
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: var(--tg-theme-secondary-bg-color, #242f3d);
            border-radius: 24px;
            padding: 6px 16px 6px 6px;
            flex: 1;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--tg-theme-button-color, #2b9ce1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            flex-shrink: 0;
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-details {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .user-name {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-username {
            font-size: 13px;
            color: var(--tg-theme-hint-color, #7d8b99);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Остальная часть интерфейса */
        .balance-section {
            text-align: center;
            margin-bottom: 24px;
        }

        .balance {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 24px;
            border: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.8;
        }

        .btn-primary {
            background-color: var(--tg-theme-button-color, #2b9ce1);
            color: var(--tg-theme-button-text-color, #ffffff);
        }

        .btn-secondary {
            background-color: var(--tg-theme-secondary-bg-color, #242f3d);
            color: var(--tg-theme-text-color, #ffffff);
        }

        .history-section {
            background-color: var(--tg-theme-secondary-bg-color, #242f3d);
            border-radius: 24px;
            padding: 20px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .history-title {
            font-size: 17px;
            font-weight: 600;
        }

        .history-all {
            font-size: 15px;
            color: var(--tg-theme-button-color, #2b9ce1);
            cursor: pointer;
        }

        .history-empty {
            background-color: var(--tg-theme-bg-color, #17212b);
            border-radius: 16px;
            height: 200px;
        }
    </style>
</head>
<body>

    <!-- Верхняя панель: QR + Профиль -->
    <div class="profile-header">
        <button class="qr-btn" id="qrScanner" title="Сканировать QR">
            <svg viewBox="0 0 24 24">
                <path d="M3 11h8V3H3v8zm2-6h4v4H5V5zM3 21h8v-8H3v8zm2-6h4v4H5v-4zM13 3v8h8V3h-8zm6 6h-4V5h4v4zM13 13h2v2h-2zM15 15h2v2h-2zM13 17h2v2h-2zM17 13h2v2h-2zM19 15h2v2h-2zM17 17h2v2h-2zM15 19h2v2h-2zM19 19h2v2h-2z"/>
            </svg>
        </button>

        <div class="profile-info">
            <div class="avatar" id="userAvatar">N</div>
            <div class="user-details">
                <div class="user-name" id="userName">Name</div>
                <div class="user-username" id="userUsername">@username</div>
            </div>
        </div>
    </div>

    <!-- Баланс -->
    <div class="balance-section">
        <div class="balance" id="balance">0,00 ₽</div>
        <div class="actions">
            <button class="btn btn-primary">+ Пополнить</button>
            <button class="btn btn-secondary">Перевести</button>
        </div>
    </div>

    <!-- История -->
    <div class="history-section">
        <div class="history-header">
            <div class="history-title">История операций</div>
            <div class="history-all">Все</div>
        </div>
        <div class="history-empty"></div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;

        // Настройка внешнего вида
        tg.ready();
        tg.expand();
        tg.setHeaderColor(tg.themeParams.bg_color || '#17212b');

        // Получение данных пользователя
        const user = tg.initDataUnsafe?.user;

        if (user) {
            // Имя
            const fullName = [user.first_name, user.last_name].filter(Boolean).join(' ');
            document.getElementById('userName').textContent = fullName || 'Name';

            // Юзернейм
            document.getElementById('userUsername').textContent = user.username ? '@' + user.username : '@username';

            // Аватарка
            const avatarEl = document.getElementById('userAvatar');
            if (user.photo_url) {
                avatarEl.innerHTML = `<img src="${user.photo_url}" alt="avatar">`;
            } else {
                avatarEl.textContent = (user.first_name?.[0] || 'N').toUpperCase();
            }
        }

        // Кнопка сканера QR
        document.getElementById('qrScanner').addEventListener('click', () => {
            if (tg.showScanQrPopup) {
                tg.showScanQrPopup({
                    text: 'Наведите камеру на QR-код'
                }, (text) => {
                    // Обработка отсканированного текста
                    tg.showAlert('Отсканировано: ' + text);
                    return true; // Закрыть popup после сканирования
                });
            } else {
                tg.showAlert('Сканер QR недоступен на этом устройстве');
            }
        });

        // Обработка события сканирования (если используется через MainButton)
        tg.onEvent('qrTextReceived', (data) => {
            console.log('QR scanned:', data);
        });
    </script>

</body>
</html>
