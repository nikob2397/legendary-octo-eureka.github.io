<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тестовая форма WebApp</title>
    
    <!-- Telegram WebApp JS -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        
        h2 {
            margin-bottom: 20px;
            font-size: 20px;
            color: var(--tg-theme-text-color, #000000);
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--tg-theme-hint-color, #707579);
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #c9cdd0);
            border-radius: 8px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-size: 16px;
            outline: none;
        }
        
        input:focus, textarea:focus, select:focus {
            border-color: var(--tg-theme-button-color, #2481cc);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: auto;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        button:active {
            opacity: 0.8;
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .info {
            margin-top: 20px;
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color, #f4f4f5);
            border-radius: 8px;
            font-size: 13px;
            color: var(--tg-theme-hint-color, #707579);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📝 Тестовая форма</h2>
        
        <form id="testForm">
            <div class="form-group">
                <label for="name">Имя</label>
                <input type="text" id="name" name="name" placeholder="Введите имя" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="email@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Телефон</label>
                <input type="tel" id="phone" name="phone" placeholder="+7 (999) 000-00-00">
            </div>
            
            <div class="form-group">
                <label for="category">Категория</label>
                <select id="category" name="category">
                    <option value="general">Общий вопрос</option>
                    <option value="support">Поддержка</option>
                    <option value="feedback">Отзыв</option>
                    <option value="other">Другое</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="message">Сообщение</label>
                <textarea id="message" name="message" placeholder="Введите сообщение..." required></textarea>
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="agree" name="agree" required>
                <label for="agree" style="margin: 0;">Согласен на обработку данных</label>
            </div>
            
            <button type="submit" id="submitBtn">📤 Отправить в бот</button>
        </form>
        
        <div class="info">
            💡 Данные будут отправлены напрямую в Telegram-бот через WebApp API
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        
        // Настройка внешнего вида
        tg.expand(); // Развернуть на всю высоту
        tg.ready();  // Сообщить, что WebApp готов
        
        // Установить цвет шапки (опционально)
        tg.setHeaderColor(tg.themeParams.bg_color || '#ffffff');
        
        // Обработка отправки формы
        document.getElementById('testForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Отправка...';
            
            // Сбор данных из формы
            const formData = {
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                category: document.getElementById('category').value,
                message: document.getElementById('message').value.trim(),
                agree: document.getElementById('agree').checked,
                timestamp: new Date().toISOString(),
                user_agent: navigator.userAgent
            };
            
            // Отправка данных в бот
            try {
                tg.sendData(JSON.stringify(formData));
                
                // Показать успешную отправку
                submitBtn.textContent = '✅ Отправлено!';
                submitBtn.style.background = '#28a745';
                
                // Закрыть WebApp через 500мс
                setTimeout(() => {
                    tg.close();
                }, 500);
                
            } catch (error) {
                console.error('Ошибка отправки:', error);
                submitBtn.disabled = false;
                submitBtn.textContent = '❌ Ошибка, попробуйте снова';
                tg.showAlert('Ошибка отправки данных: ' + error.message);
            }
        });
        
        // Обработка кнопки "Назад" в Telegram
        tg.BackButton.onClick(() => {
            tg.close();
        });
        
        // Логирование для отладки
        console.log('WebApp инициализирован:', tg.initDataUnsafe);
    </script>
</body>
</html>
